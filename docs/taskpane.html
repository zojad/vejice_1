<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CJVT Vejice</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>

<body class="ms-font-m ms-welcome ms-Fabric">
    <section id="sideload-msg" class="ms-welcome__main">
        <h2 class="ms-font-xl">Please <a target="_blank" href="https://learn.microsoft.com/office/dev/add-ins/testing/test-debug-office-add-ins#sideload-an-office-add-in-for-testing">sideload</a> your add-in to see app body.</h2>
    </section>
    <main id="app-body" class="taskpane-root" style="display: none;">
        <header class="taskpane-header">
            <h1 class="taskpane-title">Vejice 1.0</h1>
            <p class="taskpane-note">Preverite postavitev vejic v dokumentu.</p>
        </header>

        <section class="taskpane-actions">
            <button id="btn-check" class="task-btn task-btn-primary task-btn-check" type="button">Preveri vejice</button>
            <button id="btn-clear-highlights" class="task-btn task-btn-ghost task-btn-check" type="button">Pobriši označbe</button>
            <div id="secondary-actions" class="taskpane-secondary-actions">
                <button id="btn-accept-one" class="task-btn task-btn-success" type="button">Sprejmi predlog</button>
                <button id="btn-reject-one" class="task-btn task-btn-danger" type="button">Zavrni predlog</button>
                <button id="btn-accept" class="task-btn task-btn-success" type="button">Sprejmi vse</button>
                <button id="btn-reject" class="task-btn task-btn-danger" type="button">Zavrni vse</button>
            </div>
        </section>

        <p id="desktop-note" class="taskpane-note" hidden>
            Vejice urejate s Sledi spremembam.
        </p>

        <section class="taskpane-notifications">
            <div class="taskpane-notifications-header">
                <h2 class="taskpane-notifications-title">Obvestila</h2>
                <button id="btn-clear-notifications" class="task-btn task-btn-ghost" type="button">Počisti</button>
            </div>
            <p id="notification-empty" class="taskpane-note">Ni obvestil.</p>
            <ul id="notification-list" class="notification-list" aria-live="polite"></ul>
        </section>

        <section class="taskpane-status">
            <p class="status-row">
                <span id="status-spinner" class="status-spinner" aria-hidden="true"></span>
                <span id="status-line" class="status-text">Končano.</span>
            </p>
        </section>
    </main>
<script defer src="runtime.js"></script><script defer src="polyfill.js"></script><script defer src="common.js"></script><script defer src="taskpane.js"></script></body>

</html>
